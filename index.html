<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piona's AI HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════
       TOKENS — Dribbble / Behance Dark 2025
    ══════════════════════════════════════ */
    :root {
      --font: 'Inter', system-ui, sans-serif;

      --bg:      #07070d;
      --bg-card: rgba(255,255,255,0.033);
      --bg-hov:  rgba(255,255,255,0.058);
      --bg-hdr:  rgba(7,7,13,0.86);
      --bg-sb:   #050509;

      --tx1: #f0effe;
      --tx2: rgba(240,239,254,0.52);
      --tx3: rgba(240,239,254,0.28);

      --br:    rgba(255,255,255,0.07);
      --br-hv: rgba(255,255,255,0.16);

      /* accent — overridden per category */
      --a:  #a78bfa;
      --a2: #818cf8;
      --ag: rgba(167,139,250,0.18);
      --ad: rgba(167,139,250,0.09);
      --ar: 167,139,250;

      --hh: 58px;
      --sw: 228px;
      --r:  18px;
    }

    /* ── reset ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--tx1);
      -webkit-font-smoothing: antialiased;
      transition: background-image .7s ease;
    }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    header {
      position: fixed; inset: 0 0 auto 0;
      height: var(--hh);
      background: var(--bg-hdr);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--br);
      display: flex; align-items: center; z-index: 400;
    }

    .h-brand {
      width: var(--sw); flex-shrink: 0; height: 100%;
      display: flex; align-items: center; gap: 9px;
      padding: 0 18px; border-right: 1px solid var(--br);
    }

    .brand-icon {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 0.9925rem; font-weight: 700;
      color: var(--tx1); letter-spacing: -.4px;
    }

    .brand-tag {
      margin-left: 2px; font-size: 0.6325rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      padding: 2px 5px; border-radius: 4px;
      background: rgba(255,255,255,.06);
      color: var(--tx3); border: 1px solid var(--br);
    }

    .h-nav {
      display: flex; align-items: stretch;
      height: 100%; padding: 0 12px; gap: 1px; flex: 1;
    }

    .h-tab {
      position: relative;
      display: flex; align-items: center; gap: 6px;
      height: 100%; padding: 0 13px;
      border: none; background: transparent;
      color: var(--tx3);
      font-size: 0.8825rem; font-weight: 500;
      font-family: var(--font); cursor: pointer;
      transition: color .15s; white-space: nowrap;
    }

    .h-tab::after {
      content: '';
      position: absolute; bottom: 0; left: 13px; right: 13px;
      height: 2px; border-radius: 2px 2px 0 0;
      background: linear-gradient(90deg, var(--a), var(--a2));
      opacity: 0; transition: opacity .18s;
    }

    .h-tab:hover { color: rgba(255,255,255,.65); }
    .h-tab.active { color: var(--a); font-weight: 600; }
    .h-tab.active::after { opacity: 1; }
    .h-tab .ti { font-size: 0.9125rem; }

    .tab-badge {
      font-size: 0.6825rem; font-weight: 600;
      padding: 1px 5px; border-radius: 99px;
      background: rgba(255,255,255,.06); color: var(--tx3);
      border: 1px solid var(--br); transition: all .15s;
    }

    .h-tab.active .tab-badge {
      background: var(--ad); color: var(--a);
      border-color: rgba(var(--ar),.3);
    }

    .h-right {
      display: flex; align-items: center;
      gap: 8px; padding: 0 16px; margin-left: auto;
    }

    .search-wrap { position: relative; display: flex; align-items: center; }

    .search-wrap svg {
      position: absolute; left: 9px;
      width: 14px; height: 14px;
      color: var(--tx3); pointer-events: none;
    }

    .search-inp {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--br); border-radius: 8px;
      padding: 6px 12px 6px 30px;
      font-size: 0.8725rem; font-family: var(--font);
      color: var(--tx1); width: 200px; outline: none;
      transition: all .18s;
    }

    .search-inp::placeholder { color: var(--tx3); }

    .search-inp:focus {
      background: rgba(255,255,255,.08);
      border-color: var(--a);
      box-shadow: 0 0 0 3px var(--ag);
      width: 244px;
    }

    /* ══════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════ */
    aside {
      position: fixed; top: var(--hh); left: 0; bottom: 0;
      width: var(--sw); background: var(--bg-sb);
      border-right: 1px solid var(--br);
      overflow-y: auto; padding: 10px 8px 32px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.05) transparent;
    }

    aside::-webkit-scrollbar { width: 3px; }
    aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,.06); border-radius: 3px; }

    .sb-lbl {
      font-size: 0.6725rem; font-weight: 700;
      color: rgba(255,255,255,.18); text-transform: uppercase;
      letter-spacing: 1.1px; padding: 16px 10px 6px;
    }

    .sb-lbl:first-child { padding-top: 8px; }

    .sb-sep { height: 1px; background: var(--br); margin: 7px 4px; }

    .sb-item {
      width: 100%; display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border: none; background: transparent;
      color: rgba(255,255,255,.32);
      font-size: 0.8725rem; font-weight: 400;
      font-family: var(--font); border-radius: 7px;
      cursor: pointer; text-align: left;
      transition: background .12s, color .12s;
    }

    .sb-item:hover { background: rgba(255,255,255,.05); color: rgba(255,255,255,.7); }

    .sb-item.active { background: var(--ad); color: var(--a); font-weight: 550; }

    .sb-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,.1); flex-shrink: 0; transition: all .15s;
    }

    .sb-item.active .sb-dot { background: var(--a); box-shadow: 0 0 8px var(--ag); }

    .sb-n {
      margin-left: auto; font-size: 0.7225rem; font-weight: 500;
      color: rgba(255,255,255,.15);
      background: rgba(255,255,255,.05);
      padding: 1px 5px; border-radius: 4px;
    }

    .sb-item.active .sb-n { color: var(--a); opacity: .7; background: var(--ad); }

    /* ══════════════════════════════════════
       MAIN
    ══════════════════════════════════════ */
    main { margin-left: var(--sw); padding-top: var(--hh); min-height: 100vh; }

    .content {
      padding: 28px 28px 60px;
      animation: fadeUp .26s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* breadcrumb */
    .bc {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.7725rem; color: var(--tx3); margin-bottom: 18px;
    }

    .bc .sep { color: rgba(255,255,255,.1); }
    .bc .cur { color: var(--tx2); font-weight: 500; }

    /* page heading */
    .pg-head {
      display: flex; align-items: flex-end;
      justify-content: space-between; margin-bottom: 24px;
    }

    .pg-eyebrow {
      font-size: 0.7325rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--a); margin-bottom: 5px;
      text-shadow: 0 0 14px var(--ag);
    }

    .pg-title {
      font-size: 1.4625rem; font-weight: 760;
      background: linear-gradient(130deg, var(--tx1) 0%, rgba(240,239,254,.55) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -.5px;
    }

    .pg-desc { font-size: 0.8525rem; color: var(--tx3); margin-top: 5px; }

    .pg-chip {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.7925rem; font-weight: 500;
      padding: 6px 13px; border-radius: 99px;
      background: rgba(255,255,255,.05); color: var(--tx2);
      border: 1px solid var(--br);
    }

    .pg-chip .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--a); box-shadow: 0 0 7px var(--ag);
    }

    /* ══════════════════════════════════════
       OVERVIEW STATS
    ══════════════════════════════════════ */
    .overview-grid {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 12px; margin-bottom: 28px;
    }

    .ov-card {
      background: var(--bg-card); border-radius: var(--r);
      padding: 18px 20px; border: 1px solid var(--br);
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform .18s, border-color .18s, box-shadow .18s;
    }

    .ov-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at top left, var(--ag), transparent 65%);
      opacity: 0; transition: opacity .22s;
    }

    .ov-card:hover {
      transform: translateY(-3px);
      border-color: rgba(var(--ar),.35);
      box-shadow: 0 0 22px rgba(var(--ar),.12);
    }

    .ov-card:hover::before { opacity: 1; }

    .ov-num {
      font-size: 1.8625rem; font-weight: 780;
      background: linear-gradient(135deg, var(--tx1), var(--tx2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -.7px; line-height: 1;
      position: relative;
    }

    .ov-lbl { font-size: 0.7825rem; color: var(--tx3); font-weight: 500; margin-top: 4px; position: relative; }

    .ov-bar {
      height: 2px; border-radius: 99px;
      background: rgba(255,255,255,.06);
      margin-top: 14px; overflow: hidden; position: relative;
    }

    .ov-bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--a), var(--a2));
    }

    /* ══════════════════════════════════════
       SECTION DIVIDER
    ══════════════════════════════════════ */
    .sec-head {
      display: flex; align-items: center; gap: 10px;
      margin: 30px 0 14px;
    }

    .sec-head-text {
      font-size: 0.8225rem; font-weight: 650;
      color: var(--tx2); white-space: nowrap;
    }

    .sec-head-line { flex: 1; height: 1px; background: var(--br); }

    .sec-head-n {
      font-size: 0.7025rem; font-weight: 600; color: var(--tx3);
      background: rgba(255,255,255,.05); border: 1px solid var(--br);
      padding: 2px 7px; border-radius: 4px;
    }

    /* ══════════════════════════════════════
       BENTO GRID
    ══════════════════════════════════════ */
    .bento { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }

    /* ── base card ── */
    .bc-card {
      background: var(--bg-card);
      border: 1px solid var(--br);
      border-radius: var(--r);
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; overflow: hidden;
      cursor: pointer; position: relative;
      transition: transform .22s cubic-bezier(.22,1,.36,1),
                  border-color .22s, box-shadow .22s;
    }

    /* inner radial glow on hover */
    .bc-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 0% 0%, rgba(var(--ar),.12), transparent 58%);
      opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 0;
    }

    .bc-card:hover {
      transform: translateY(-4px) scale(1.009);
      border-color: rgba(var(--ar),.4);
      box-shadow: 0 0 0 1px rgba(var(--ar),.12),
                  0 20px 60px rgba(0,0,0,.55),
                  0 0 35px rgba(var(--ar),.1);
    }

    .bc-card:hover::before { opacity: 1; }

    .bc-in { position: relative; z-index: 1; }

    /* ── wide card ── */
    .bc-wide { grid-column: span 2; }

    .bc-wide .bc-in {
      display: flex; flex-direction: row; align-items: center;
      gap: 20px; padding: 22px 24px; flex: 1;
    }

    .bc-wide .bc-favicon-wrap { width: 50px; height: 50px; border-radius: 13px; flex-shrink: 0; }
    .bc-wide .bc-favicon       { width: 27px; height: 27px; }
    .bc-wide .bc-body          { flex: 1; }
    .bc-wide .bc-name          { font-size: 1.0125rem; font-weight: 700; }

    .bc-wide .bc-desc {
      font-size: 0.8525rem; margin-top: 4px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .bc-wide .bc-foot { margin-top: 10px; }

    /* ── normal card ── */
    .bc-in {
      display: flex; flex-direction: column;
      padding: 17px 18px; gap: 10px; flex: 1;
    }

    .bc-favicon-wrap {
      width: 36px; height: 36px; border-radius: 9px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }

    .bc-favicon { width: 20px; height: 20px; object-fit: contain; }

    .bc-head-row { display: flex; align-items: flex-start; justify-content: space-between; }

    .bc-name {
      font-size: 0.9375rem; font-weight: 650;
      color: var(--tx1); letter-spacing: -.2px; line-height: 1.25;
    }

    .bc-arrow {
      opacity: 0; color: var(--tx3); font-size: 0.8125rem; font-style: normal;
      transition: opacity .15s, transform .15s; flex-shrink: 0;
    }

    .bc-card:hover .bc-arrow { opacity: 1; transform: translate(1px,-1px); }

    .bc-desc { font-size: 0.8125rem; color: var(--tx3); line-height: 1.6; flex: 1; }

    .bc-foot {
      display: flex; align-items: center; gap: 5px;
      padding-top: 9px; border-top: 1px solid rgba(255,255,255,.05);
      margin-top: auto;
    }

    .bc-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--a); opacity: .4; flex-shrink: 0;
      transition: opacity .15s, box-shadow .15s;
    }

    .bc-card:hover .bc-dot { opacity: 1; box-shadow: 0 0 7px var(--ag); }

    .bc-domain {
      font-size: 0.7525rem; color: var(--tx3); font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      transition: color .15s;
    }

    .bc-card:hover .bc-domain { color: var(--a); }

    /* ── featured (gradient bg, index 0) ── */
    .bc-featured {
      border-color: transparent !important;
    }

    /* second inner glow overlay */
    .bc-featured::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at top left, rgba(var(--ar),.18), transparent 55%);
      pointer-events: none; z-index: 0;
    }

    .bc-featured .bc-name  { color: var(--tx1); }
    .bc-featured .bc-desc  { color: rgba(240,239,254,.42); }
    .bc-featured .bc-foot  { border-top-color: rgba(255,255,255,.07); }
    .bc-featured .bc-dot   { opacity: .8; }
    .bc-featured .bc-domain { color: rgba(240,239,254,.3); }
    .bc-featured:hover .bc-domain { color: var(--a); }
    .bc-featured .bc-favicon-wrap {
      background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.14);
    }

    /* per-category dark gradients */
    .bg-indigo  {
      background: linear-gradient(145deg, rgba(99,102,241,.24) 0%, rgba(139,92,246,.1) 100%);
      border: 1px solid rgba(139,92,246,.28) !important;
    }
    .bg-violet  {
      background: linear-gradient(145deg, rgba(236,72,153,.24) 0%, rgba(167,139,250,.1) 100%);
      border: 1px solid rgba(236,72,153,.28) !important;
    }
    .bg-cyan    {
      background: linear-gradient(145deg, rgba(6,182,212,.24) 0%, rgba(59,130,246,.1) 100%);
      border: 1px solid rgba(6,182,212,.28) !important;
    }
    .bg-emerald {
      background: linear-gradient(145deg, rgba(16,185,129,.24) 0%, rgba(20,184,166,.1) 100%);
      border: 1px solid rgba(16,185,129,.28) !important;
    }
    .bg-orange  {
      background: linear-gradient(145deg, rgba(251,146,60,.24) 0%, rgba(251,191,36,.1) 100%);
      border: 1px solid rgba(251,146,60,.28) !important;
    }

    /* ══════════════════════════════════════
       CATEGORY ACCENT TOKENS
    ══════════════════════════════════════ */
    [data-cat="AI 어시스턴트"]  { --a:#a78bfa; --a2:#818cf8; --ag:rgba(167,139,250,.18); --ad:rgba(167,139,250,.09); --ar:167,139,250; }
    [data-cat="AI 크리에이티브"] { --a:#f472b6; --a2:#e879f9; --ag:rgba(244,114,182,.18); --ad:rgba(244,114,182,.09); --ar:244,114,182; }
    [data-cat="개발 도구"]       { --a:#22d3ee; --a2:#60a5fa; --ag:rgba(34,211,238,.18);  --ad:rgba(34,211,238,.09);  --ar:34,211,238;  }
    [data-cat="AI 리서치"]       { --a:#34d399; --a2:#2dd4bf; --ag:rgba(52,211,153,.18);  --ad:rgba(52,211,153,.09);  --ar:52,211,153;  }
    [data-cat="UI/UX 디자인"]   { --a:#fb923c; --a2:#fbbf24; --ag:rgba(251,146,60,.18);  --ad:rgba(251,146,60,.09);  --ar:251,146,60;  }

    /* ══════════════════════════════════════
       SEARCH RESULTS
    ══════════════════════════════════════ */
    .sr-header { font-size: 0.8625rem; color: var(--tx3); margin-bottom: 18px; }
    .sr-header strong { color: var(--tx1); }

    .no-results { text-align: center; padding: 80px 20px; color: var(--tx3); }
    .no-results .nr-ico { font-size: 2.5625rem; margin-bottom: 12px; opacity: .5; }
    .no-results p { font-size: 0.9125rem; }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 1100px) {
      .bento { grid-template-columns: repeat(3,1fr); }
      .overview-grid { grid-template-columns: repeat(2,1fr); }
    }

    @media (max-width: 800px) {
      .bento { grid-template-columns: repeat(2,1fr); }
      .bc-wide { grid-column: span 2; }
    }

    @media (max-width: 600px) {
      :root { --sw: 0px; }
      aside { display: none; }
      .content { padding: 16px 14px 40px; }
      .bento { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="h-brand">
    <div class="brand-icon">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="13" y1="4" x2="4" y2="16" stroke="var(--a)" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="13" y1="4" x2="22" y2="16" stroke="var(--a)" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="5.5" y1="16" x2="20.5" y2="16" stroke="var(--a)" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="13" y1="4" x2="13" y2="16" stroke="var(--a2)" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="1.5 2"/>
        <circle cx="13" cy="4" r="2.2" fill="var(--a)"/>
        <circle cx="4" cy="16" r="2.2" fill="var(--a)"/>
        <circle cx="22" cy="16" r="2.2" fill="var(--a)"/>
        <circle cx="13" cy="16" r="1.4" fill="var(--a2)" opacity="0.8"/>
        <circle cx="8.5" cy="10.5" r="1" fill="var(--a2)" opacity="0.5"/>
        <circle cx="17.5" cy="10.5" r="1" fill="var(--a2)" opacity="0.5"/>
      </svg>
    </div>
    <span class="brand-name">Piona's AI HUB</span>
  </div>
  <nav class="h-nav" id="hNav"></nav>
  <div class="h-right">
    <div class="search-wrap">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="8.5" cy="8.5" r="5.5"/>
        <line x1="12.5" y1="12.5" x2="17" y2="17"/>
      </svg>
      <input class="search-inp" type="search" id="si"
             placeholder="서비스 검색..." autocomplete="off"
             oninput="onSearch(this.value)" />
    </div>
  </div>
</header>

<!-- SIDEBAR -->
<aside id="sb"></aside>

<!-- MAIN -->
<main><div class="content" id="ca"></div></main>

<script>
/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
const DATA = {
  "AI 어시스턴트": {
    icon:"🤖", grad:"bg-indigo",
    desc:"대화형 AI 챗봇과 LLM 기반 어시스턴트",
    subs:{
      "챗봇 & LLM":[
        {name:"Claude",            url:"https://claude.ai",                        desc:"Anthropic의 안전 중심 AI 어시스턴트"},

/* accent tokens per category — applied to :root so header inherits */
const ACCENTS = {
  "AI 어시스턴트":  {a:'#a78bfa', a2:'#818cf8', ag:'rgba(167,139,250,.18)', ad:'rgba(167,139,250,.09)', ar:'167,139,250'},
  "AI 크리에이티브": {a:'#f472b6', a2:'#e879f9', ag:'rgba(244,114,182,.18)', ad:'rgba(244,114,182,.09)', ar:'244,114,182'},
  "개발 도구":       {a:'#22d3ee', a2:'#60a5fa', ag:'rgba(34,211,238,.18)',  ad:'rgba(34,211,238,.09)',  ar:'34,211,238'},
  "AI 리서치":       {a:'#34d399', a2:'#2dd4bf', ag:'rgba(52,211,153,.18)',  ad:'rgba(52,211,153,.09)',  ar:'52,211,153'},
  "UI/UX 디자인":   {a:'#fb923c', a2:'#fbbf24', ag:'rgba(251,146,60,.18)',  ad:'rgba(251,146,60,.09)',  ar:'251,146,60'},
};

function setAmbient(c) {
  const [c1, c2] = AMBIENT[c] || AMBIENT["AI 어시스턴트"];
  document.body.style.backgroundImage =
    `radial-gradient(ellipse at 18% 12%, ${c1} 0%, transparent 52%),
     radial-gradient(ellipse at 82% 88%, ${c2} 0%, transparent 52%)`;

  const acc = ACCENTS[c];
  if (acc) {
    const r = document.documentElement.style;
    r.setProperty('--a',  acc.a);
    r.setProperty('--a2', acc.a2);
    r.setProperty('--ag', acc.ag);
    r.setProperty('--ad', acc.ad);
    r.setProperty('--ar', acc.ar);
  }
}

/* ══════════════════════════════════════
   BENTO SIZE  — index % 7 === 0 → wide
══════════════════════════════════════ */
const isWide = i => (i % 7 === 0);

/* ══════════════════════════════════════
   CARD HTML
══════════════════════════════════════ */
function cardHTML(item, idx, catKey, isFeatured) {
  const wide = isWide(idx);
  const grad = isFeatured ? DATA[catKey].grad : '';

  const favEl = `
    <div class="bc-favicon-wrap">
      <img class="bc-favicon" src="${fav(item.url)}" alt="${item.name}" loading="lazy"
           onerror="this.parentNode.innerHTML='<span style=font-size:15px;font-weight:700;color:var(--a)>${item.name[0]}</span>'" />
    </div>`;

  if (wide) {
    return `
      <a class="bc-card bc-wide ${isFeatured ? 'bc-featured '+grad : ''}"
         href="${item.url}" target="_blank" rel="noopener">
        <div class="bc-in">
          ${favEl}
          <div class="bc-body">
            <div class="bc-name">${item.name}</div>
            <div class="bc-desc">${item.desc}</div>
            <div class="bc-foot">
              <span class="bc-dot"></span>
              <span class="bc-domain">${dom(item.url)}</span>
            </div>
          </div>
          <i class="bc-arrow">↗</i>
        </div>
      </a>`;
  }

  return `
    <a class="bc-card ${isFeatured ? 'bc-featured '+grad : ''}"
       href="${item.url}" target="_blank" rel="noopener">
      <div class="bc-in">
        <div class="bc-head-row">${favEl}<i class="bc-arrow">↗</i></div>
        <div class="bc-name">${item.name}</div>
        <div class="bc-desc">${item.desc}</div>
        <div class="bc-foot">
          <span class="bc-dot"></span>
          <span class="bc-domain">${dom(item.url)}</span>
        </div>
      </div>
    </a>`;
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function renderNav() {
  document.getElementById('hNav').innerHTML =
    Object.entries(DATA).map(([c,d]) => `
      <button class="h-tab ${c===cat?'active':''}" onclick="selCat('${c}')">
        ${c}
        <span class="tab-badge">${catTotal(c)}</span>
      </button>`).join('');
}

function renderSB() {
  const subs = DATA[cat].subs;
  const total = Object.values(subs).flat().length;
  document.getElementById('sb').innerHTML = `
    <div class="sb-lbl">탐색</div>
    <button class="sb-item ${sub==='__all'?'active':''}" onclick="selSub('__all')">
      <span class="sb-dot"></span>전체 보기<span class="sb-n">${total}</span>
    </button>
    <div class="sb-sep"></div>
    <div class="sb-lbl">소분류</div>
    ${Object.entries(subs).map(([s,items]) => `
      <button class="sb-item ${sub===s?'active':''}" onclick="selSub('${s}')">
        <span class="sb-dot"></span>${s}<span class="sb-n">${items.length}</span>
      </button>`).join('')}`;
}

function renderContent() {
  const area = document.getElementById('ca');
  area.setAttribute('data-cat', cat);

  /* search */
  if (q.trim()) {
    const lq = q.toLowerCase();
    const hits = [];
    Object.values(DATA).forEach(d =>
      Object.values(d.subs).forEach(items =>
        items.forEach(it => {
          if (it.name.toLowerCase().includes(lq) ||
              it.desc.toLowerCase().includes(lq) ||
              dom(it.url).includes(lq)) hits.push(it);
        })));
    area.innerHTML = `
      <div class="sr-header">"<strong>${q}</strong>" 검색 결과 — <strong>${hits.length}</strong>개 서비스</div>
      ${hits.length
        ? `<div class="bento">${hits.map((it,i)=>cardHTML(it,i,cat,i===0)).join('')}</div>`
        : `<div class="no-results"><div class="nr-ico">🔍</div><p>검색 결과가 없습니다.</p></div>`}`;
    return;
  }

  const catD = DATA[cat];
  const curItems = sub==='__all' ? Object.values(catD.subs).flat() : (catD.subs[sub]||[]);

  const bc = `<div class="bc">
    <span>AI Hub</span><span class="sep">›</span><span>${cat}</span>
    ${sub!=='__all'?`<span class="sep">›</span><span class="cur">${sub}</span>`:''}
  </div>`;

  const ph = `<div class="pg-head">
    <div>
      <div class="pg-eyebrow">${cat}</div>
      <div class="pg-title">${sub==='__all'?'전체 서비스':sub}</div>
      <div class="pg-desc">${catD.desc}</div>
    </div>
    <div class="pg-chip"><span class="dot"></span>${curItems.length}개 서비스</div>
  </div>`;

  let ovHTML = '';
  if (sub==='__all') {
    const total = Object.values(catD.subs).flat().length;
    ovHTML = `<div class="overview-grid">
      ${Object.entries(catD.subs).map(([s,items])=>`
        <div class="ov-card" onclick="selSub('${s}')">
          <div class="ov-num">${items.length}</div>
          <div class="ov-lbl">${s}</div>
          <div class="ov-bar">
            <div class="ov-bar-fill" style="width:${Math.round(items.length/total*100)}%"></div>
          </div>
        </div>`).join('')}
    </div>`;
  }

  let gridHTML = '';
  if (sub==='__all') {
    gridHTML = Object.entries(catD.subs).map(([s,items])=>`
      <div>
        <div class="sec-head">
          <span class="sec-head-text">${s}</span>
          <span class="sec-head-line"></span>
          <span class="sec-head-n">${items.length}</span>
        </div>
        <div class="bento">${items.map((it,i)=>cardHTML(it,i,cat,i===0)).join('')}</div>
      </div>`).join('');
  } else {
    gridHTML = `<div class="bento">${curItems.map((it,i)=>cardHTML(it,i,cat,i===0)).join('')}</div>`;
  }

  area.innerHTML = bc + ph + ovHTML + gridHTML;
}

function renderAll() { renderNav(); renderSB(); renderContent(); }

/* ══════════════════════════════════════
   EVENTS
══════════════════════════════════════ */
function selCat(c) {
  cat = c;
  sub = Object.keys(DATA[c].subs)[0];
  q   = '';
  document.getElementById('si').value = '';
  setAmbient(c);
  renderAll();
}

function selSub(s) { sub = s; renderAll(); }
function onSearch(v) { q = v; renderContent(); }

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
setAmbient(cat);
renderAll();
</script>
</body>
</html>
