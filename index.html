<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Hub — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─── */
    :root {
      --font: 'Inter', system-ui, -apple-system, sans-serif;

      /* Neutrals */
      --white:    #ffffff;
      --gray-50:  #f8fafc;
      --gray-100: #f1f5f9;
      --gray-150: #eaf0f7;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;

      /* Accent – overridden per category */
      --accent:      #6366f1;
      --accent-soft: #eef2ff;
      --accent-mid:  #c7d2fe;

      /* Layout */
      --hh: 58px;
      --sw: 232px;
      --r:  10px;
      --r-sm: 6px;
      --r-lg: 14px;

      /* Sidebar */
      --sb-bg:          #0f172a;
      --sb-text:        #94a3b8;
      --sb-hover:       rgba(255,255,255,0.055);
      --sb-active-bg:   rgba(99,102,241,0.14);
      --sb-active-text: #a5b4fc;
      --sb-border:      rgba(255,255,255,0.05);
      --sb-label:       rgba(255,255,255,0.22);

      /* Cards */
      --card-bg:      #ffffff;
      --card-border:  #e2e8f0;
      --card-shadow:  0 1px 2px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.04);
      --card-hover:   0 6px 20px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.05);
    }

    /* ─── RESET ─── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--hh);
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      z-index: 300;
    }

    .logo-zone {
      width: var(--sw);
      flex-shrink: 0;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 20px;
      border-right: 1px solid var(--gray-200);
    }

    .logo-mark {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(99,102,241,0.35);
    }

    .logo-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--gray-900);
      letter-spacing: -0.4px;
    }

    .logo-pill {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--gray-100);
      color: var(--gray-500);
      border: 1px solid var(--gray-200);
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 1px;
      padding: 0 16px;
      flex: 1;
      height: 100%;
    }

    .nav-tab {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 100%;
      padding: 0 14px;
      border: none;
      background: transparent;
      color: var(--gray-500);
      font-size: 0.84rem;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .nav-tab::after {
      content: '';
      position: absolute;
      bottom: 0; left: 14px; right: 14px;
      height: 2px;
      border-radius: 2px 2px 0 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .nav-tab:hover { color: var(--gray-800); }

    .nav-tab.active {
      color: var(--accent);
      font-weight: 600;
    }

    .nav-tab.active::after { opacity: 1; }

    .nav-tab .t-icon { font-size: 0.88rem; }

    .nav-count {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 99px;
      background: var(--gray-100);
      color: var(--gray-400);
      border: 1px solid var(--gray-200);
      transition: all 0.15s;
    }

    .nav-tab.active .nav-count {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent-mid);
    }

    /* Search + actions */
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      margin-left: auto;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-box svg {
      position: absolute;
      left: 10px;
      width: 14px; height: 14px;
      color: var(--gray-400);
      pointer-events: none;
    }

    .search-input {
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      border-radius: var(--r-sm);
      padding: 6px 12px 6px 32px;
      font-size: 0.82rem;
      font-family: var(--font);
      color: var(--gray-900);
      width: 210px;
      outline: none;
      transition: all 0.15s;
    }

    .search-input::placeholder { color: var(--gray-400); }

    .search-input:focus {
      background: var(--white);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
      width: 250px;
    }

    /* ─── SIDEBAR ─── */
    aside {
      position: fixed;
      top: var(--hh); left: 0; bottom: 0;
      width: var(--sw);
      background: var(--sb-bg);
      border-right: 1px solid var(--sb-border);
      overflow-y: auto;
      padding: 12px 8px 32px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.07) transparent;
    }

    aside::-webkit-scrollbar { width: 3px; }
    aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 3px; }

    .sb-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--sb-label);
      text-transform: uppercase;
      letter-spacing: 1.1px;
      padding: 18px 10px 7px;
    }

    .sb-label:first-child { padding-top: 8px; }

    .sb-divider {
      height: 1px;
      background: var(--sb-border);
      margin: 8px 4px;
    }

    .sb-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border: none;
      background: transparent;
      color: var(--sb-text);
      font-size: 0.83rem;
      font-weight: 450;
      font-family: var(--font);
      border-radius: var(--r-sm);
      cursor: pointer;
      text-align: left;
      transition: background 0.12s, color 0.12s;
    }

    .sb-item:hover {
      background: var(--sb-hover);
      color: rgba(255,255,255,0.78);
    }

    .sb-item.active {
      background: var(--sb-active-bg);
      color: var(--sb-active-text);
      font-weight: 550;
    }

    .sb-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      flex-shrink: 0;
      transition: background 0.12s;
    }

    .sb-item.active .sb-dot {
      background: #818cf8;
      box-shadow: 0 0 0 3px rgba(129,140,248,0.2);
    }

    .sb-count {
      margin-left: auto;
      font-size: 0.68rem;
      font-weight: 500;
      color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .sb-item.active .sb-count {
      color: rgba(165,180,252,0.65);
      background: rgba(99,102,241,0.18);
    }

    /* ─── MAIN ─── */
    main {
      margin-left: var(--sw);
      padding-top: var(--hh);
      min-height: 100vh;
    }

    .content {
      padding: 30px 32px 56px;
    }

    /* breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--gray-400);
      margin-bottom: 18px;
    }

    .breadcrumb span { cursor: default; }
    .breadcrumb .sep { color: var(--gray-300); }
    .breadcrumb .current { color: var(--gray-700); font-weight: 500; }

    /* page title row */
    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title-wrap {}

    .page-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 750;
      color: var(--gray-900);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .page-desc {
      font-size: 0.82rem;
      color: var(--gray-400);
      margin-top: 5px;
      font-weight: 400;
    }

    .page-meta {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .meta-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--gray-100);
      color: var(--gray-500);
      border: 1px solid var(--gray-200);
    }

    .meta-chip .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ─── STAT STRIP ─── */
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .stat-tile {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--r);
      padding: 14px 18px;
      box-shadow: var(--card-shadow);
    }

    .stat-num {
      font-size: 1.55rem;
      font-weight: 750;
      color: var(--gray-900);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .stat-lbl {
      font-size: 0.72rem;
      color: var(--gray-400);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ─── SUB SECTION HEADER ─── */
    .sub-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 26px 0 14px;
    }

    .sub-head-text {
      font-size: 0.8rem;
      font-weight: 650;
      color: var(--gray-600);
      letter-spacing: -0.1px;
    }

    .sub-head-line {
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    .sub-head-count {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--gray-400);
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      padding: 2px 7px;
      border-radius: 4px;
    }

    /* ─── CARDS ─── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 11px;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--card-border);
      border-radius: var(--r);
      padding: 16px 18px 14px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.16s, transform 0.16s, box-shadow 0.16s;
      box-shadow: var(--card-shadow);
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: var(--card-hover);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-icon-wrap {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-favicon {
      width: 20px; height: 20px;
      object-fit: contain;
    }

    .card-arrow {
      opacity: 0;
      color: var(--gray-300);
      font-size: 0.75rem;
      transition: opacity 0.15s, transform 0.15s;
      font-style: normal;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translate(1px, -1px);
    }

    .card-name {
      font-size: 0.875rem;
      font-weight: 650;
      color: var(--gray-900);
      letter-spacing: -0.2px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.77rem;
      color: var(--gray-400);
      line-height: 1.6;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 5px;
      padding-top: 8px;
      border-top: 1px solid var(--gray-100);
      margin-top: auto;
    }

    .card-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
      flex-shrink: 0;
    }

    .card-domain {
      font-size: 0.7rem;
      color: var(--gray-400);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.15s;
    }

    .card:hover .card-dot   { opacity: 1; }
    .card:hover .card-domain { color: var(--accent); }

    /* ─── SEARCH RESULTS ─── */
    .search-results-header {
      font-size: 0.8rem;
      color: var(--gray-400);
      margin-bottom: 18px;
    }

    .search-results-header strong { color: var(--gray-700); }

    .no-results {
      text-align: center;
      padding: 64px 20px;
      color: var(--gray-400);
    }

    .no-results .nr-icon { font-size: 2rem; margin-bottom: 10px; }
    .no-results p { font-size: 0.85rem; }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .content { animation: fadeUp 0.22s ease; }

    /* ─── CATEGORY COLOR OVERRIDES ─── */
    [data-cat="AI 어시스턴트"]  { --accent:#6366f1; --accent-soft:#eef2ff; --accent-mid:#c7d2fe; }
    [data-cat="AI 크리에이티브"] { --accent:#8b5cf6; --accent-soft:#f5f3ff; --accent-mid:#ddd6fe; }
    [data-cat="개발 도구"]       { --accent:#0891b2; --accent-soft:#ecfeff; --accent-mid:#a5f3fc; }
    [data-cat="AI 리서치"]       { --accent:#059669; --accent-soft:#ecfdf5; --accent-mid:#a7f3d0; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .stat-strip { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      :root { --sw: 0px; }
      aside { display: none; }
      .content { padding: 20px 16px 40px; }
      .header-nav { padding: 0 6px; }
      .nav-tab { padding: 0 8px; font-size: 0.78rem; }
    }
  </style>
</head>

</header>

<!-- ─── SIDEBAR ─── -->
<aside id="sidebar"></aside>

<!-- ─── MAIN ─── -->
<main>
  <div class="content" id="contentArea"></div>
</main>

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let activeCat = Object.keys(DATA)[0];
let activeSub = Object.keys(DATA[activeCat].subs)[0];
let searchQuery = '';

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
const favicon = url => {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; }
  catch { return ''; }
};

const domain = url => {
  try { return new URL(url).hostname.replace('www.',''); }
  catch { return url; }
};

const totalCount = () =>
  Object.values(DATA).reduce((s, c) =>
    s + Object.values(c.subs).flat().length, 0);

const catCount = cat =>
  Object.values(DATA[cat].subs).flat().length;

/* ════════════════════════════════════════
   RENDER — HEADER NAV
════════════════════════════════════════ */
function renderHeaderNav() {
  document.getElementById('headerNav').innerHTML =
    Object.entries(DATA).map(([cat, d]) => `
      <button
        class="nav-tab ${cat === activeCat ? 'active' : ''}"
        onclick="selectCat('${cat}')"
      >
        <span class="t-icon">${d.icon}</span>
        ${cat}
        <span class="nav-count">${catCount(cat)}</span>
      </button>
    `).join('');
}

/* ════════════════════════════════════════
   RENDER — SIDEBAR
════════════════════════════════════════ */
function renderSidebar() {
  const subs = DATA[activeCat].subs;
  const allCount = Object.values(subs).flat().length;

  document.getElementById('sidebar').innerHTML = `
    <div class="sb-label">전체</div>
    <button class="sb-item ${activeSub === '__all' ? 'active' : ''}"
            onclick="selectSub('__all')">
      <span class="sb-dot"></span>
      전체 보기
      <span class="sb-count">${allCount}</span>
    </button>

    <div class="sb-divider"></div>
    <div class="sb-label">소분류</div>

    ${Object.entries(subs).map(([s, items]) => `
      <button class="sb-item ${activeSub === s ? 'active' : ''}"
              onclick="selectSub('${s}')">
        <span class="sb-dot"></span>
        ${s}
        <span class="sb-count">${items.length}</span>
      </button>
    `).join('')}
  `;
}

/* ════════════════════════════════════════
   RENDER — CARD
════════════════════════════════════════ */
function cardHTML(item) {
  return `
    <a class="card" href="${item.url}" target="_blank" rel="noopener noreferrer">
      <div class="card-header">
        <div class="card-icon-wrap">
          <img class="card-favicon"
               src="${favicon(item.url)}"
               alt="${item.name}"
               loading="lazy"
               onerror="this.parentNode.innerHTML='<span style=font-size:14px>${item.name[0]}</span>'" />
        </div>
        <i class="card-arrow">↗</i>
      </div>
      <div class="card-name">${item.name}</div>
      <div class="card-desc">${item.desc}</div>
      <div class="card-footer">
        <span class="card-dot"></span>
        <span class="card-domain">${domain(item.url)}</span>
      </div>
    </a>
  `;
}

/* ════════════════════════════════════════
   RENDER — CONTENT
════════════════════════════════════════ */
function renderContent() {
  const catData = DATA[activeCat];
  const area = document.getElementById('contentArea');
  area.setAttribute('data-cat', activeCat);

  /* ── SEARCH MODE ── */
  if (searchQuery.trim().length > 0) {
    const q = searchQuery.toLowerCase();
    const hits = [];
    Object.values(DATA).forEach(c =>
      Object.values(c.subs).forEach(items =>
        items.forEach(item => {
          if (
            item.name.toLowerCase().includes(q) ||
            item.desc.toLowerCase().includes(q) ||
            domain(item.url).includes(q)
          ) hits.push(item);
        })
      )
    );

    area.innerHTML = `
      <div class="search-results-header">
        "<strong>${searchQuery}</strong>" 검색 결과 — <strong>${hits.length}</strong>개 서비스
      </div>
      ${hits.length
        ? `<div class="card-grid">${hits.map(cardHTML).join('')}</div>`
        : `<div class="no-results">
             <div class="nr-icon">🔍</div>
             <p>검색 결과가 없습니다.</p>
           </div>`
      }
    `;
    return;
  }

  /* ── BREADCRUMB ── */
  const crumb = `
    <div class="breadcrumb">
      <span>AI Hub</span>
      <span class="sep">›</span>
      <span>${activeCat}</span>
      ${activeSub !== '__all' ? `<span class="sep">›</span><span class="current">${activeSub}</span>` : ''}
    </div>
  `;

  /* ── PAGE HEADER ── */
  const subCount = activeSub === '__all'
    ? Object.values(catData.subs).flat().length
    : (catData.subs[activeSub] || []).length;

  const pageHead = `
    <div class="page-head">
      <div class="page-title-wrap">
        <div class="page-eyebrow">${activeCat}</div>
        <div class="page-title">
          ${activeSub === '__all' ? '전체 서비스' : activeSub}
        </div>
        <div class="page-desc">${catData.desc}</div>
      </div>
      <div class="page-meta">
        <div class="meta-chip">
          <span class="dot"></span>
          ${subCount}개 서비스
        </div>
      </div>
    </div>
  `;

  /* ── STATS (전체 보기일 때만) ── */
  let statsHTML = '';
  if (activeSub === '__all') {
    const subEntries = Object.entries(catData.subs);
    statsHTML = `
      <div class="stat-strip">
        ${subEntries.map(([s, items]) => `
          <div class="stat-tile">
            <div class="stat-num">${items.length}</div>
            <div class="stat-lbl">${s}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  /* ── CARD SECTIONS ── */
  let sectionsHTML = '';
  if (activeSub === '__all') {
    sectionsHTML = Object.entries(catData.subs).map(([s, items]) => `
      <div>
        <div class="sub-head">
          <span class="sub-head-text">${s}</span>
          <span class="sub-head-line"></span>
          <span class="sub-head-count">${items.length}</span>
        </div>
        <div class="card-grid">${items.map(cardHTML).join('')}</div>
      </div>
    `).join('');
  } else {
    const items = catData.subs[activeSub] || [];
    sectionsHTML = `<div class="card-grid">${items.map(cardHTML).join('')}</div>`;
  }

  area.innerHTML = crumb + pageHead + statsHTML + sectionsHTML;
}

/* ════════════════════════════════════════
   RENDER — ALL
════════════════════════════════════════ */
function renderAll() {
  renderHeaderNav();
  renderSidebar();
  renderContent();
}

/* ════════════════════════════════════════
   EVENTS
════════════════════════════════════════ */
function selectCat(cat) {
  activeCat = cat;
  activeSub = Object.keys(DATA[cat].subs)[0];
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderAll();
}

function selectSub(sub) {
  activeSub = sub;
  renderAll();
}

function handleSearch(val) {
  searchQuery = val;
  renderContent();
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
renderAll();
</script>
