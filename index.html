<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piona's AI HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    /* ══════════════════════════════════════
       TOKENS — Glassmorphism Light 2025
    ══════════════════════════════════════ */
    :root {
      --font: 'Roboto', 'Noto Sans KR', sans-serif;
      --font-logo: 'Roboto', sans-serif;

      --bg-card: rgba(255,255,255,0.58);
      --bg-hov:  rgba(255,255,255,0.80);
      --bg-hdr:  rgba(255,255,255,0.75);
      --bg-sb:   rgba(255,255,255,0.52);

      --tx1: #1e1b4b;
      --tx2: rgba(30,27,75,0.65);
      --tx3: rgba(30,27,75,0.42);

      --br:    rgba(255,255,255,0.80);
      --br-hv: rgba(255,255,255,0.96);

      /* accent — overridden per category */
      --a:  #7c3aed;
      --a2: #6d28d9;
      --ag: rgba(124,58,237,0.15);
      --ad: rgba(124,58,237,0.08);
      --ar: 124,58,237;

      --hh: 58px;
      --sw: 228px;
      --r:  18px;
    }

    /* ── reset ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      background: #f4f2ff;
      font-family: var(--font);
      color: var(--tx1);
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    header {
      position: fixed; inset: 0 0 auto 0;
      height: var(--hh);
      background: var(--bg-hdr);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--br);
      box-shadow: 0 1px 24px rgba(0,0,0,0.07);
      display: flex; align-items: center; z-index: 400;
    }

    .h-brand {
      width: var(--sw); flex-shrink: 0; height: 100%;
      display: flex; align-items: center; gap: 9px;
      padding: 0 18px; border-right: 1px solid var(--br);
    }

.brand-name {
      font-size: 1.35rem; font-weight: 800;
      font-family: var(--font-logo);
      color: var(--tx1); letter-spacing: .5px;
      text-transform: uppercase;
    }

    .brand-name-accent {
      color: var(--a);
    }

    .brand-tag {
      margin-left: 2px; font-size: 0.71rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      padding: 2px 5px; border-radius: 4px;
      background: rgba(0,0,0,0.05);
      color: var(--tx3); border: 1px solid rgba(0,0,0,0.07);
    }

    .h-nav {
      display: flex; align-items: stretch;
      height: 100%; padding: 0 12px; gap: 1px; flex: 1;
    }

    .h-tab {
      position: relative;
      display: flex; align-items: center; gap: 6px;
      height: 100%; padding: 0 13px;
      border: none; background: transparent;
      color: var(--tx3);
      font-size: 0.96rem; font-weight: 500;
      font-family: var(--font); cursor: pointer;
      transition: color .15s; white-space: nowrap;
    }

    .h-tab::after {
      content: '';
      position: absolute; bottom: 0; left: 13px; right: 13px;
      height: 2px; border-radius: 2px 2px 0 0;
      background: linear-gradient(90deg, var(--a), var(--a2));
      opacity: 0; transition: opacity .18s;
    }

    .h-tab:hover { color: var(--tx2); }
    .h-tab.active { color: var(--a); font-weight: 600; }
    .h-tab.active::after { opacity: 1; }
    .h-tab .ti { font-size: 0.99rem; }

    .h-right {
      display: flex; align-items: center;
      gap: 8px; padding: 0 16px; margin-left: auto;
    }

    .sb-visitor {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 10px 14px;
    }

    .sb-visitor-inner {
      display: flex; align-items: center; gap: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--br);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      padding: 10px 12px;
    }

    .sb-visitor-ico {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--ad);
      border: 1px solid rgba(var(--ar),.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }

    .sb-visitor-text {
      display: flex; align-items: center; justify-content: space-between;
      flex: 1; min-width: 0;
    }

    .sb-visitor-lbl {
      font-size: 0.76rem; color: var(--tx3);
      font-weight: 500; letter-spacing: .2px;
    }

    .sb-visitor-num {
      font-size: 0.95rem; font-weight: 700;
      color: var(--a); letter-spacing: -.3px;
    }

    .search-wrap { position: relative; display: flex; align-items: center; }

    .search-wrap svg {
      position: absolute; left: 9px;
      width: 14px; height: 14px;
      color: var(--a); pointer-events: none;
    }

    .search-inp {
      background: rgba(255,255,255,0.65);
      border: 1.5px solid rgba(124,58,237,0.35); border-radius: 8px;
      padding: 6px 12px 6px 30px;
      font-size: 0.95rem; font-family: var(--font);
      color: var(--tx1); width: 200px; outline: none;
      transition: all .18s;
    }

    .search-inp::placeholder { color: var(--tx2); }

    .search-inp:focus {
      background: rgba(255,255,255,0.88);
      border-color: var(--a);
      box-shadow: 0 0 0 3px var(--ag);
      width: 244px;
    }

    /* ══════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════ */
    aside {
      position: fixed; top: var(--hh); left: 0; bottom: 0;
      width: var(--sw);
      background: var(--bg-sb);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-right: 1px solid var(--br);
      box-shadow: 4px 0 24px rgba(0,0,0,0.05);
      overflow-y: auto; padding: 10px 8px 90px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,.08) transparent;
    }

    aside::-webkit-scrollbar { width: 3px; }
    aside::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 3px; }

    .sb-lbl {
      font-size: 0.75rem; font-weight: 700;
      color: rgba(30,27,75,0.30); text-transform: uppercase;
      letter-spacing: 1.1px; padding: 16px 10px 6px;
    }

    .sb-lbl:first-child { padding-top: 8px; }

    .sb-sep { height: 1px; background: rgba(0,0,0,0.07); margin: 7px 4px; }

    .sb-item {
      width: 100%; display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border: none; background: transparent;
      color: rgba(30,27,75,0.48);
      font-size: 0.95rem; font-weight: 400;
      font-family: var(--font); border-radius: 7px;
      cursor: pointer; text-align: left;
      transition: background .12s, color .12s;
    }

    .sb-item:hover { background: rgba(255,255,255,0.60); color: var(--tx1); }

    .sb-item.active { background: var(--ad); color: var(--a); font-weight: 550; }

    .sb-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(30,27,75,0.15); flex-shrink: 0; transition: all .15s;
    }

    .sb-item.active .sb-dot { background: var(--a); box-shadow: 0 0 8px var(--ag); }

    .sb-n {
      margin-left: auto; font-size: 0.80rem; font-weight: 500;
      color: rgba(30,27,75,0.35);
      background: rgba(0,0,0,0.05);
      padding: 1px 5px; border-radius: 4px;
    }

    .sb-item.active .sb-n { color: var(--a); opacity: .7; background: var(--ad); }

    /* ══════════════════════════════════════
       MAIN
    ══════════════════════════════════════ */
    main { margin-left: var(--sw); padding-top: var(--hh); min-height: 100vh; }

    .content {
      padding: 28px 28px 60px;
      animation: fadeUp .26s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* breadcrumb */
    .bc {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.85rem; color: var(--tx3); margin-bottom: 18px;
    }

    .bc .sep { color: rgba(30,27,75,0.15); }
    .bc .cur { color: var(--tx2); font-weight: 500; }

    /* page heading */
    .pg-head {
      display: flex; align-items: flex-end;
      justify-content: space-between; margin-bottom: 24px;
    }

    .pg-eyebrow {
      font-size: 0.81rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--a); margin-bottom: 5px;
    }

    .pg-title {
      font-size: 1.54rem; font-weight: 760;
      background: linear-gradient(130deg, var(--tx1) 0%, rgba(30,27,75,.58) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -.5px;
    }

    .pg-desc { font-size: 0.93rem; color: var(--tx3); margin-top: 5px; }

    .pg-chip {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.87rem; font-weight: 500;
      padding: 6px 13px; border-radius: 99px;
      background: rgba(255,255,255,0.70); color: var(--tx2);
      border: 1px solid var(--br);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .pg-chip .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--a); box-shadow: 0 0 7px var(--ag);
    }

    /* ══════════════════════════════════════
       OVERVIEW STATS
    ══════════════════════════════════════ */
    .overview-grid {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 12px; margin-bottom: 28px;
    }

    .ov-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--r);
      padding: 18px 20px; border: 1px solid var(--br);
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform .18s, border-color .18s, box-shadow .18s;
    }

    .ov-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at top left, var(--ag), transparent 65%);
      opacity: 0; transition: opacity .22s;
    }

    .ov-card:hover {
      transform: translateY(-3px);
      border-color: rgba(var(--ar),.4);
      box-shadow: 0 8px 28px rgba(0,0,0,0.10);
    }

    .ov-card:hover::before { opacity: 1; }

    .ov-num {
      font-size: 1.94rem; font-weight: 780;
      background: linear-gradient(135deg, var(--tx1), var(--tx2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -.7px; line-height: 1;
      position: relative;
    }

    .ov-lbl { font-size: 0.86rem; color: var(--tx3); font-weight: 500; margin-top: 4px; position: relative; }

    .ov-bar {
      height: 2px; border-radius: 99px;
      background: rgba(0,0,0,0.07);
      margin-top: 14px; overflow: hidden; position: relative;
    }

    .ov-bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--a), var(--a2));
    }

    /* ══════════════════════════════════════
       SECTION DIVIDER
    ══════════════════════════════════════ */
    .sec-head {
      display: flex; align-items: center; gap: 10px;
      margin: 30px 0 14px;
    }

    .sec-head-text {
      font-size: 0.90rem; font-weight: 650;
      color: var(--tx2); white-space: nowrap;
    }

    .sec-head-line { flex: 1; height: 1px; background: rgba(0,0,0,0.08); }

    .sec-head-n {
      font-size: 0.78rem; font-weight: 600; color: var(--tx3);
      background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.07);
      padding: 2px 7px; border-radius: 4px;
    }

    /* ══════════════════════════════════════
       BENTO GRID
    ══════════════════════════════════════ */
    .bento { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

    /* ── base card ── */
    .bc-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--br);
      border-radius: var(--r);
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; overflow: hidden;
      cursor: pointer; position: relative;
      transition: transform .22s cubic-bezier(.22,1,.36,1),
                  border-color .22s, box-shadow .22s;
    }

    .bc-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 0% 0%, rgba(var(--ar),.10), transparent 58%);
      opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 0;
    }

    .bc-card:hover {
      transform: translateY(-4px) scale(1.009);
      border-color: rgba(var(--ar),.45);
      box-shadow: 0 12px 36px rgba(0,0,0,0.11),
                  0 0 0 1px rgba(var(--ar),.15);
    }

    .bc-card:hover::before { opacity: 1; }

    .bc-in { position: relative; z-index: 1; }

    /* ── normal card ── */
    .bc-in {
      display: flex; flex-direction: column;
      padding: 17px 18px; gap: 10px; flex: 1;
    }

    .bc-favicon-wrap {
      width: 36px; height: 36px; border-radius: 9px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .bc-favicon { width: 20px; height: 20px; object-fit: contain; }

    .bc-head-row { display: flex; align-items: flex-start; justify-content: space-between; }

    .bc-name {
      font-size: 1.01rem; font-weight: 650;
      color: var(--tx1); letter-spacing: -.2px; line-height: 1.25;
    }

    .bc-arrow {
      opacity: 0; color: var(--tx3); font-size: 0.89rem; font-style: normal;
      transition: opacity .15s, transform .15s; flex-shrink: 0;
    }

    .bc-card:hover .bc-arrow { opacity: 1; transform: translate(1px,-1px); }

    .bc-desc {
      font-size: 0.89rem; color: var(--tx3); line-height: 1.6; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bc-foot {
      display: flex; align-items: center; gap: 5px;
      padding-top: 9px; border-top: 1px solid rgba(0,0,0,0.07);
      margin-top: auto;
    }

    .bc-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--a); opacity: .4; flex-shrink: 0;
      transition: opacity .15s, box-shadow .15s;
    }

    .bc-card:hover .bc-dot { opacity: 1; box-shadow: 0 0 7px var(--ag); }

    .bc-domain {
      font-size: 0.83rem; color: var(--tx3); font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      transition: color .15s;
    }

    .bc-card:hover .bc-domain { color: var(--a); }

    /* ── featured (gradient bg, index 0) ── */
    .bc-featured {
      border-color: transparent !important;
    }

    .bc-featured::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at top left, rgba(var(--ar),.14), transparent 55%);
      pointer-events: none; z-index: 0;
    }

    .bc-featured .bc-name  { color: var(--tx1); }
    .bc-featured .bc-desc  { color: rgba(30,27,75,0.55); }
    .bc-featured .bc-foot  { border-top-color: rgba(0,0,0,0.07); }
    .bc-featured .bc-dot   { opacity: .8; }
    .bc-featured .bc-domain { color: rgba(30,27,75,0.45); }
    .bc-featured:hover .bc-domain { color: var(--a); }
    .bc-featured .bc-favicon-wrap {
      background: rgba(255,255,255,0.88); border-color: rgba(0,0,0,0.08);
    }

    /* featured card — single accent gradient */
    .bg-indigo, .bg-violet, .bg-cyan, .bg-emerald, .bg-orange {
      background: linear-gradient(145deg, rgba(124,58,237,.14) 0%, rgba(109,40,217,.05) 100%);
      border: 1px solid rgba(124,58,237,.22) !important;
    }


    /* ══════════════════════════════════════
       SEARCH RESULTS
    ══════════════════════════════════════ */
    .sr-header { font-size: 0.94rem; color: var(--tx3); margin-bottom: 18px; }
    .sr-header strong { color: var(--tx1); }

    .no-results { text-align: center; padding: 80px 20px; color: var(--tx3); }
    .no-results .nr-ico { font-size: 2.64rem; margin-bottom: 12px; opacity: .5; }
    .no-results p { font-size: 0.99rem; }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 1100px) {
      .bento { grid-template-columns: repeat(3,1fr); }
      .overview-grid { grid-template-columns: repeat(2,1fr); }
    }

    @media (max-width: 800px) {
      .bento { grid-template-columns: repeat(2,1fr); }
    }

    @media (max-width: 600px) {
      :root { --sw: 0px; }
      aside { display: none; }
      .content { padding: 16px 14px 40px; }
      .bento { grid-template-columns: 1fr 1fr; gap: 10px; }
    }

    /* ══════════════════════════════════════
       Kaggle Learn inspired illustration refresh
    ══════════════════════════════════════ */
    :root {
      --font: 'Roboto', 'Noto Sans KR', sans-serif;
      --bg-card: #ffffff;
      --bg-hov: #f8fafc;
      --bg-hdr: #ffffff;
      --bg-sb: #ffffff;
      --tx1: #202124;
      --tx2: #4b5563;
      --tx3: #7b8794;
      --br: #e5e7eb;
      --br-hv: #cfd6df;
      --a: #20beff;
      --a2: #1097d5;
      --ag: rgba(32,190,255,0.14);
      --ad: rgba(32,190,255,0.08);
      --ar: 32,190,255;
      --hh: 64px;
      --sw: 236px;
      --r: 8px;
      --yellow: #ffe15a;
      --blue: #20beff;
      --green: #1fbf75;
      --coral: #ff7a59;
      --ink: #202124;
    }

    html { background: #ffffff; }

    body {
      background: #ffffff;
      color: var(--tx1);
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--br);
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .h-brand {
      border-right: 1px solid var(--br);
      padding: 0 22px;
      justify-content: flex-start;
    }

    .brand-name {
      color: var(--blue);
      font-size: 1.52rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.2px;
      text-transform: lowercase;
      white-space: nowrap;
    }

    .brand-name-accent {
      color: var(--ink);
    }

    .h-nav {
      gap: 0;
      padding: 0 16px;
    }

    .h-tab {
      color: #5f6368;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 0 10px;
    }

    .h-tab::after {
      left: 12px;
      right: 12px;
      height: 3px;
      background: var(--ink);
      border-radius: 3px 3px 0 0;
    }

    .h-tab:hover,
    .h-tab.active {
      color: var(--ink);
    }

    .h-tab.active {
      font-weight: 700;
    }

    .search-inp {
      width: 250px;
      background: #ffffff;
      border: 1px solid #dadce0;
      border-radius: 999px;
      color: var(--ink);
      padding: 9px 14px 9px 36px;
      font-size: 0.93rem;
    }

    .search-inp:focus {
      width: 292px;
      background: #ffffff;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(32,190,255,.16);
    }

    .search-wrap svg {
      left: 13px;
      color: #5f6368;
    }

    aside {
      background: #ffffff;
      border-right: 1px solid var(--br);
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      padding: 14px 10px 96px;
    }

    .sb-lbl {
      color: #9aa0a6;
      font-size: 0.72rem;
      letter-spacing: .7px;
      padding: 14px 12px 8px;
    }

    .sb-sep {
      background: #eef0f2;
      margin: 9px 2px;
    }

    .sb-item {
      position: relative;
      gap: 10px;
      color: #5f6368;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.87rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .sb-item::before {
      content: '';
      position: absolute;
      left: -10px;
      top: 7px;
      bottom: 7px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: transparent;
    }

    .sb-item:hover {
      background: #f6f8fa;
      color: var(--ink);
    }

    .sb-item.active {
      background: #f1f3f4;
      color: var(--ink);
      font-weight: 700;
    }

function cardHTML(item, idx, catKey, isFeatured) {
  const grad = isFeatured ? DATA[catKey].grad : '';
  const tone = `cat-${catClass(catKey)}`;

  const favEl = `
    <div class="bc-favicon-wrap">
      <span class="bc-favicon-letter" aria-hidden="true">${serviceInitial(item.name)}</span>
    </div>`;

  return `
    <a class="bc-card ${tone} ${isFeatured ? 'bc-featured '+grad : ''}"
       href="${item.url}" target="_blank" rel="noopener">
      <div class="bc-in">
        <div class="bc-head-row">${favEl}<i class="bc-arrow">↗</i></div>
        <div class="bc-name">${item.name}</div>
        <div class="bc-desc">${item.desc}</div>
        <div class="bc-foot">
          <span class="bc-dot"></span>
          <span class="bc-domain">${dom(item.url)}</span>
        </div>
      </div>
    </a>`;
}

      </button>`).join('')}
    <div class="sb-visitor"><div class="sb-visitor-inner">
      <div class="sb-visitor-ico"><i class="bi bi-eye" aria-hidden="true"></i></div>
      <div class="sb-visitor-text">
        <div class="sb-visitor-lbl">방문 횟수</div>
        <div class="sb-visitor-num">${visits.toLocaleString('ko-KR')}회</div>
      </div>
    </div></div>`;
}

function renderContent() {
  const area = document.getElementById('ca');
  area.setAttribute('data-cat', cat);

  /* search */
  if (q.trim()) {
    const lq = q.toLowerCase();
    const hits = [];
    Object.values(DATA).forEach(d =>
      Object.values(d.subs).forEach(items =>
        items.forEach(it => {
          if (it.name.toLowerCase().includes(lq) ||
              it.desc.toLowerCase().includes(lq) ||
              dom(it.url).includes(lq)) hits.push(it);
        })));
    area.innerHTML = `
      <div class="sr-header">"<strong>${q}</strong>" 검색 결과 — <strong>${hits.length}</strong>개 서비스</div>
      ${hits.length
        ? `<div class="bento">${hits.map((it,i)=>cardHTML(it,i,cat,i===0)).join('')}</div>`
        : `<div class="no-results"><div class="nr-ico">🔍</div><p>검색 결과가 없습니다.</p></div>`}`;
    return;
  }

  const catD = DATA[cat];
  const curItems = sub==='__all' ? Object.values(catD.subs).flat() : (catD.subs[sub]||[]);

  const bc = `<div class="bc">
    <span>AI Hub</span><span class="sep">›</span><span>${cat}</span>
    ${sub!=='__all'?`<span class="sep">›</span><span class="cur">${sub}</span>`:''}
  </div>`;

  const hero = heroHTML(cat, sub, curItems);

  const ph = `<div class="pg-head">
    <div>
      <div class="pg-eyebrow">${cat}</div>
      <div class="pg-title">${sub==='__all'?'전체 서비스':sub}</div>
      <div class="pg-desc">${catD.desc}</div>
    </div>
    <div class="pg-chip"><span class="dot"></span>${curItems.length}개 서비스</div>
  </div>`;

  let ovHTML = '';
  if (sub==='__all') {
    const total = Object.values(catD.subs).flat().length;
    ovHTML = `<div class="overview-grid">
      ${Object.entries(catD.subs).map(([s,items])=>`
        <div class="ov-card" onclick="selSub('${s}')">
          <div class="ov-num">${items.length}</div>
          <div class="ov-lbl">${s}</div>
          <div class="ov-bar">
            <div class="ov-bar-fill" style="width:${Math.round(items.length/total*100)}%"></div>
          </div>
        </div>`).join('')}
    </div>`;
  }

  let gridHTML = '';
  if (sub==='__all') {
    gridHTML = Object.entries(catD.subs).map(([s,items])=>`
      <div>
        <div class="sec-head">
          <span class="sec-head-text">${s}</span>
          <span class="sec-head-line"></span>
          <span class="sec-head-n">${items.length}</span>
        </div>
        <div class="bento">${items.map((it,i)=>cardHTML(it,i,cat,i===0)).join('')}</div>
      </div>`).join('');
  } else {
    gridHTML = `<div class="bento">${curItems.map((it,i)=>cardHTML(it,i,cat,i===0)).join('')}</div>`;
  }

  area.innerHTML = bc + hero + ph + ovHTML + gridHTML;
}

function renderAll() { renderNav(); renderSB(); renderContent(); }

/* ══════════════════════════════════════
   EVENTS
══════════════════════════════════════ */
function selCat(c) {
  cat = c;
  sub = '__all';
  q   = '';
  document.getElementById('si').value = '';
  renderAll();
}

function selSub(s) { sub = s; renderAll(); }
function onSearch(v) { q = v; renderContent(); }

/* ══════════════════════════════════════
   VISITOR COUNTER
══════════════════════════════════════ */
(function() {
  const key = 'piona_visits';
  const count = (parseInt(localStorage.getItem(key)) || 0) + 1;
  localStorage.setItem(key, count);
})();

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
renderAll();
</script>
</body>
</html>
