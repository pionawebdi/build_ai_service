<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Hub — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════ */
    :root {
      --font: 'Inter', system-ui, sans-serif;

      /* Surface */
      --page-bg:   #f2f2f7;
      --card-bg:   #ffffff;
      --hdr-bg:    #ffffff;
      --sb-bg:     #0d1117;

      /* Neutrals */
      --n-50:  #f8fafc;
      --n-100: #f1f5f9;
      --n-200: #e2e8f0;
      --n-300: #cbd5e1;
      --n-400: #94a3b8;
      --n-500: #64748b;
      --n-600: #475569;
      --n-700: #334155;
      --n-800: #1e293b;
      --n-900: #0f172a;

      /* Accent (overridden per category) */
      --a:     #6366f1;
      --a-soft:#eef2ff;
      --a-mid: #c7d2fe;
      --a-dark:#4338ca;

      /* Layout */
      --hh: 58px;
      --sw: 228px;

      /* Card */
      --r: 20px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 8px 28px rgba(0,0,0,0.1),  0 2px 6px rgba(0,0,0,0.06);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.06);

      /* Sidebar */
      --sb-text:    rgba(148,163,184,1);
      --sb-hover:   rgba(255,255,255,0.05);
      --sb-active:  rgba(99,102,241,0.15);
      --sb-active-t:#a5b4fc;
      --sb-sep:     rgba(255,255,255,0.05);
    }

    /* ═══════════════════════════════
       BASE
    ═══════════════════════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: var(--font);
      background: var(--page-bg);
      color: var(--n-900);
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════
       HEADER
    ═══════════════════════════════ */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--hh);
      background: var(--hdr-bg);
      border-bottom: 1px solid var(--n-200);
      display: flex;
      align-items: center;
      z-index: 400;
    }

    .h-brand {
      width: var(--sw);
      flex-shrink: 0;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 18px;
      border-right: 1px solid var(--n-200);
    }

    .brand-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(99,102,241,.3);
      flex-shrink: 0;
    }

    .brand-name {
      font-size: .93rem;
      font-weight: 700;
      color: var(--n-900);
      letter-spacing: -.4px;
    }

    .brand-tag {
      margin-left: 2px;
      font-size: .58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 2px 5px;
      border-radius: 4px;
      background: var(--n-100);
      color: var(--n-500);
      border: 1px solid var(--n-200);
    }

    .h-nav {
      display: flex;
      align-items: stretch;
      height: 100%;
      padding: 0 12px;
      gap: 2px;
      flex: 1;
    }

    .h-tab {
      position: relative;
      display: flex; align-items: center;
      gap: 6px;
      height: 100%;
      padding: 0 13px;
      border: none; background: transparent;
      color: var(--n-500);
      font-size: .83rem; font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: color .15s;
      white-space: nowrap;
    }

    .h-tab::after {
      content: '';
      position: absolute;
      bottom: 0; left: 13px; right: 13px;
      height: 2px; border-radius: 2px 2px 0 0;
      background: var(--a);
      opacity: 0; transition: opacity .15s;
    }

    .h-tab:hover { color: var(--n-800); }

    .h-tab.active { color: var(--a); font-weight: 600; }
    .h-tab.active::after { opacity: 1; }

    .h-tab .ti { font-size: .85rem; }

    .tab-badge {
      font-size: .65rem; font-weight: 600;
      padding: 1px 5px; border-radius: 99px;
      background: var(--n-100); color: var(--n-400);
      border: 1px solid var(--n-200);
      transition: all .15s;
    }

    .h-tab.active .tab-badge {
      background: var(--a-soft); color: var(--a);
      border-color: var(--a-mid);
    }

    .h-right {
      display: flex; align-items: center;
      gap: 8px; padding: 0 16px;
      margin-left: auto;
    }

    .search-wrap { position: relative; display: flex; align-items: center; }

    .search-wrap svg {
      position: absolute; left: 9px;
      width: 14px; height: 14px;
      color: var(--n-400); pointer-events: none;
    }

    .search-inp {
      background: var(--n-100);
      border: 1px solid var(--n-200);
      border-radius: 8px;
      padding: 6px 12px 6px 30px;
      font-size: .81rem; font-family: var(--font);
      color: var(--n-900); width: 200px; outline: none;
      transition: all .18s;
    }

    .search-inp::placeholder { color: var(--n-400); }

    .search-inp:focus {
      background: #fff; border-color: var(--a);
      box-shadow: 0 0 0 3px rgba(99,102,241,.1);
      width: 244px;
    }

    /* ═══════════════════════════════
       SIDEBAR
    ═══════════════════════════════ */
    aside {
      position: fixed;
      top: var(--hh); left: 0; bottom: 0;
      width: var(--sw);
      background: var(--sb-bg);
      border-right: 1px solid var(--sb-sep);
      overflow-y: auto;
      padding: 10px 8px 32px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.06) transparent;
    }

    aside::-webkit-scrollbar { width: 3px; }
    aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 3px; }

    .sb-lbl {
      font-size: .63rem; font-weight: 700;
      color: rgba(255,255,255,.2); text-transform: uppercase;
      letter-spacing: 1.1px; padding: 16px 10px 6px;
    }

    .sb-lbl:first-child { padding-top: 8px; }

    .sb-sep { height: 1px; background: var(--sb-sep); margin: 7px 4px; }

    .sb-item {
      width: 100%;
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      border: none; background: transparent;
      color: var(--sb-text);
      font-size: .82rem; font-weight: 400;
      font-family: var(--font);
      border-radius: 7px; cursor: pointer; text-align: left;
      transition: background .12s, color .12s;
    }

    .sb-item:hover { background: var(--sb-hover); color: rgba(255,255,255,.75); }

    .sb-item.active {
      background: var(--sb-active);
      color: var(--sb-active-t); font-weight: 550;
    }

    .sb-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,.1); flex-shrink: 0;
    }

    .sb-item.active .sb-dot {
      background: #818cf8;
      box-shadow: 0 0 0 3px rgba(129,140,248,.2);
    }

    .sb-n {
      margin-left: auto;
      font-size: .67rem; font-weight: 500;
      color: rgba(255,255,255,.18);
      background: rgba(255,255,255,.05);
      padding: 1px 5px; border-radius: 4px;
    }

    .sb-item.active .sb-n {
      color: rgba(165,180,252,.65);
      background: rgba(99,102,241,.18);
    }

    /* ═══════════════════════════════
       MAIN
    ═══════════════════════════════ */
    main {
      margin-left: var(--sw);
      padding-top: var(--hh);
      min-height: 100vh;
    }

    .content {
      padding: 28px 28px 60px;
      animation: fadeUp .22s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* breadcrumb */
    .bc {
      display: flex; align-items: center; gap: 5px;
      font-size: .72rem; color: var(--n-400);
      margin-bottom: 16px;
    }

    .bc .sep { color: var(--n-300); }
    .bc .cur { color: var(--n-600); font-weight: 500; }

    /* page heading */
    .pg-head {
      display: flex; align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .pg-eyebrow {
      font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .7px;
      color: var(--a); margin-bottom: 4px;
    }

    .pg-title {
      font-size: 1.35rem; font-weight: 760;
      color: var(--n-900); letter-spacing: -.5px;
    }

    .pg-desc {
      font-size: .8rem; color: var(--n-400);
      margin-top: 4px;
    }

    .pg-chip {
      display: flex; align-items: center; gap: 5px;
      font-size: .74rem; font-weight: 500;
      padding: 5px 12px; border-radius: 99px;
      background: #fff; color: var(--n-500);
      border: 1px solid var(--n-200);
      box-shadow: var(--shadow-sm);
    }

    .pg-chip .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--a);
    }

    /* ═══════════════════════════════
       OVERVIEW STATS (전체 보기)
    ═══════════════════════════════ */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .ov-card {
      background: #fff;
      border-radius: var(--r);
      padding: 18px 20px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: transform .18s, box-shadow .18s;
      border: 1px solid transparent;
    }

    .ov-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--a-mid);
    }

    .ov-icon { font-size: 1.4rem; margin-bottom: 10px; }

    .ov-num {
      font-size: 1.7rem; font-weight: 780;
      color: var(--n-900); letter-spacing: -.6px; line-height: 1;
    }

    .ov-lbl {
      font-size: .73rem; color: var(--n-400);
      font-weight: 500; margin-top: 3px;
    }

    .ov-bar {
      height: 3px; border-radius: 99px;
      background: var(--a-soft);
      margin-top: 12px; overflow: hidden;
    }

    .ov-bar-fill {
      height: 100%; border-radius: 99px;
      background: var(--a);
    }

    /* ═══════════════════════════════
       SECTION HEADER (sub divider)
    ═══════════════════════════════ */
    .sec-head {
      display: flex; align-items: center; gap: 10px;
      margin: 28px 0 14px;
    }

    .sec-head-text {
      font-size: .78rem; font-weight: 650;
      color: var(--n-600); white-space: nowrap;
    }

    .sec-head-line { flex: 1; height: 1px; background: var(--n-200); }

    .sec-head-n {
      font-size: .66rem; font-weight: 600;
      color: var(--n-400); background: var(--n-100);
      border: 1px solid var(--n-200);
      padding: 2px 7px; border-radius: 4px;
    }

    /* ═══════════════════════════════
       BENTO GRID
    ═══════════════════════════════ */
    .bento {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 13px;
    }

    /* ── BASE CARD ── */
    .bc-card {
      background: var(--card-bg);
      border-radius: var(--r);
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0,0,0,0.04);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform .2s cubic-bezier(.22,1,.36,1),
                  box-shadow .2s cubic-bezier(.22,1,.36,1);
      cursor: pointer;
    }

    .bc-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: var(--shadow-lg);
    }

    /* ── WIDE (2 col) ── */
    .bc-wide { grid-column: span 2; }

    /* ── TALL (2 row) ── */
    .bc-tall { grid-row: span 2; }

    /* ── FEATURED gradient (index 0 of each section) ── */
    .bc-featured { border: none; }

    /* ── WIDE CARD INNER — horizontal ── */
    .bc-wide .bc-in {
      flex-direction: row;
      align-items: center;
      gap: 20px;
      padding: 24px 26px;
      flex: 1;
    }

    .bc-wide .bc-favicon-wrap {
      width: 54px; height: 54px;
      border-radius: 14px; flex-shrink: 0;
    }

    .bc-wide .bc-favicon { width: 30px; height: 30px; }

    .bc-wide .bc-body { flex: 1; }

    .bc-wide .bc-name { font-size: 1rem; font-weight: 700; }

    .bc-wide .bc-desc {
      font-size: .82rem; margin-top: 4px;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bc-wide .bc-foot { margin-top: 10px; }

    /* ── NORMAL CARD INNER — vertical ── */
    .bc-in {
      display: flex;
      flex-direction: column;
      padding: 18px 20px;
      gap: 10px;
      flex: 1;
    }

    .bc-favicon-wrap {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--n-100);
      border: 1px solid var(--n-200);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }

    .bc-favicon {
      width: 22px; height: 22px;
      object-fit: contain;
    }

    .bc-head-row {
      display: flex; align-items: flex-start;
      justify-content: space-between;
    }

    .bc-name {
      font-size: .88rem; font-weight: 650;
      color: var(--n-900); letter-spacing: -.2px;
      line-height: 1.25;
    }

    .bc-arrow {
      opacity: 0; color: var(--n-300);
      font-size: .75rem; font-style: normal;
      transition: opacity .15s, transform .15s;
      flex-shrink: 0; margin-top: 1px;
    }

    .bc-card:hover .bc-arrow { opacity: 1; transform: translate(1px,-1px); }

    .bc-desc {
      font-size: .76rem; color: var(--n-400);
      line-height: 1.6; flex: 1;
    }

    .bc-foot {
      display: flex; align-items: center; gap: 5px;
      padding-top: 9px;
      border-top: 1px solid var(--n-100);
      margin-top: auto;
    }

    .bc-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--a); opacity: .4; flex-shrink: 0;
      transition: opacity .15s;
    }

    .bc-card:hover .bc-dot { opacity: 1; }

    .bc-domain {
      font-size: .7rem; color: var(--n-400);
      font-weight: 500; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      transition: color .15s;
    }

    .bc-card:hover .bc-domain { color: var(--a); }

    /* ── featured card text tints ── */
    .bc-featured .bc-favicon-wrap {
      background: rgba(255,255,255,.5);
      border-color: rgba(255,255,255,.4);
    }

    .bc-featured .bc-name  { color: var(--n-900); }
    .bc-featured .bc-desc  { color: var(--n-600); }
    .bc-featured .bc-foot  { border-top-color: rgba(0,0,0,.06); }
    .bc-featured .bc-dot   { background: var(--a); }
    .bc-featured .bc-domain { color: var(--n-500); }
    .bc-featured:hover .bc-domain { color: var(--a-dark); }

    /* ── Category gradient palettes ── */
    .bg-indigo  { background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%); }
    .bg-violet  { background: linear-gradient(145deg, #fdf4ff 0%, #ede9fe 100%); }
    .bg-cyan    { background: linear-gradient(145deg, #ecfeff 0%, #dbeafe 100%); }
    .bg-emerald { background: linear-gradient(145deg, #ecfdf5 0%, #d1fae5 100%); }

    /* ═══════════════════════════════
       CATEGORY COLOR SCOPE
    ═══════════════════════════════ */
    [data-cat="AI 어시스턴트"]  { --a:#6366f1; --a-soft:#eef2ff; --a-mid:#c7d2fe; --a-dark:#4338ca; }
    [data-cat="AI 크리에이티브"] { --a:#7c3aed; --a-soft:#f5f3ff; --a-mid:#ddd6fe; --a-dark:#5b21b6; }
    [data-cat="개발 도구"]       { --a:#0891b2; --a-soft:#ecfeff; --a-mid:#a5f3fc; --a-dark:#0e7490; }
    [data-cat="AI 리서치"]       { --a:#059669; --a-soft:#ecfdf5; --a-mid:#a7f3d0; --a-dark:#047857; }

    /* ═══════════════════════════════
       SEARCH RESULTS
    ═══════════════════════════════ */
    .sr-header {
      font-size: .8rem; color: var(--n-400);
      margin-bottom: 18px;
    }

    .sr-header strong { color: var(--n-700); }

    .no-results {
      text-align: center; padding: 80px 20px;
      color: var(--n-400);
    }

    .no-results .nr-ico { font-size: 2.5rem; margin-bottom: 12px; }
    .no-results p { font-size: .85rem; }

    /* ═══════════════════════════════
       RESPONSIVE
    ═══════════════════════════════ */
    @media (max-width: 1100px) {
      .bento { grid-template-columns: repeat(3, 1fr); }
      .overview-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 800px) {
      .bento { grid-template-columns: repeat(2, 1fr); }
      .bc-wide { grid-column: span 2; }
    }

    @media (max-width: 600px) {
      :root { --sw: 0px; }
      aside { display: none; }
      .content { padding: 16px 14px 40px; }
      .bento { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
  </style>
</head>

<!-- ═══ HEADER ═══ -->

</header>

<aside id="sb"></aside>

<!-- ═══ MAIN ═══ -->
<main>

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let cat  = Object.keys(DATA)[0];
let sub  = Object.keys(DATA[cat].subs)[0];
let q    = '';

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
const fav = url => {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; }
  catch { return ''; }
};

const dom = url => {
  try { return new URL(url).hostname.replace(/^www\./,''); }
  catch { return url; }
};

const catTotal = c => Object.values(DATA[c].subs).flat().length;

const allTotal = () => Object.keys(DATA).reduce((s,c) => s + catTotal(c), 0);

/* ══════════════════════════════════════
   BENTO SIZE LOGIC
   Pattern per 7: indices 0,5 → wide ; rest → normal
══════════════════════════════════════ */
const isWide = i => (i % 7 === 0 || i % 7 === 5);

/* ══════════════════════════════════════
   CARD HTML
══════════════════════════════════════ */
function cardHTML(item, idx, catKey, isFeatured) {
  const wide = isWide(idx);
  const grad = isFeatured ? DATA[catKey].grad : '';

  const faviconEl = `
    <div class="bc-favicon-wrap">
      <img class="bc-favicon"
           src="${fav(item.url)}"
           alt="${item.name}" loading="lazy"
           onerror="this.parentNode.innerHTML='<span style=font-size:16px;font-weight:700;color:var(--a)>${item.name[0]}</span>'" />
    </div>`;

  if (wide) {
    return `
      <a class="bc-card bc-wide ${isFeatured ? 'bc-featured '+grad : ''}"
         href="${item.url}" target="_blank" rel="noopener">
        <div class="bc-in">
          ${faviconEl}
          <div class="bc-body">
            <div class="bc-name">${item.name}</div>
            <div class="bc-desc">${item.desc}</div>
            <div class="bc-foot">
              <span class="bc-dot"></span>
              <span class="bc-domain">${dom(item.url)}</span>
            </div>
          </div>
          <i class="bc-arrow">↗</i>
        </div>
      </a>`;
  }

  return `
    <a class="bc-card ${isFeatured ? 'bc-featured '+grad : ''}"
       href="${item.url}" target="_blank" rel="noopener">
      <div class="bc-in">
        <div class="bc-head-row">
          ${faviconEl}
          <i class="bc-arrow">↗</i>
        </div>
        <div class="bc-name">${item.name}</div>
        <div class="bc-desc">${item.desc}</div>
        <div class="bc-foot">
          <span class="bc-dot"></span>
          <span class="bc-domain">${dom(item.url)}</span>
        </div>
      </div>
    </a>`;
}

/* ══════════════════════════════════════
   RENDER — HEADER NAV
══════════════════════════════════════ */
function renderNav() {
  document.getElementById('hNav').innerHTML =
    Object.entries(DATA).map(([c,d]) => `
      <button class="h-tab ${c===cat?'active':''}" onclick="selCat('${c}')">
        <span class="ti">${d.icon}</span>
        ${c}
        <span class="tab-badge">${catTotal(c)}</span>
      </button>`).join('');
}

/* ══════════════════════════════════════
   RENDER — SIDEBAR
══════════════════════════════════════ */
function renderSB() {
  const subs = DATA[cat].subs;
  const total = Object.values(subs).flat().length;
  document.getElementById('sb').innerHTML = `
    <div class="sb-lbl">탐색</div>
    <button class="sb-item ${sub==='__all'?'active':''}" onclick="selSub('__all')">
      <span class="sb-dot"></span>전체 보기<span class="sb-n">${total}</span>
    </button>
    <div class="sb-sep"></div>
    <div class="sb-lbl">소분류</div>
    ${Object.entries(subs).map(([s,items]) => `
      <button class="sb-item ${sub===s?'active':''}" onclick="selSub('${s}')">
        <span class="sb-dot"></span>${s}
        <span class="sb-n">${items.length}</span>
      </button>`).join('')}`;
}

/* ══════════════════════════════════════
   RENDER — CONTENT
══════════════════════════════════════ */
function renderContent() {
  const area = document.getElementById('ca');
  area.setAttribute('data-cat', cat);

  /* — SEARCH — */
  if (q.trim()) {
    const lq = q.toLowerCase();
    const hits = [];
    Object.values(DATA).forEach(d =>
      Object.values(d.subs).forEach(items =>
        items.forEach(it => {
          if (it.name.toLowerCase().includes(lq) ||
              it.desc.toLowerCase().includes(lq) ||
              dom(it.url).includes(lq)) hits.push(it);
        })));

    area.innerHTML = `
      <div class="sr-header">
        "<strong>${q}</strong>" 검색 결과 — <strong>${hits.length}</strong>개 서비스
      </div>
      ${hits.length
        ? `<div class="bento">${hits.map((it,i) => cardHTML(it,i,cat,i===0)).join('')}</div>`
        : `<div class="no-results"><div class="nr-ico">🔍</div><p>검색 결과가 없습니다.</p></div>`}`;
    return;
  }

  const catD = DATA[cat];
  const curItems = sub === '__all'
    ? Object.values(catD.subs).flat()
    : (catD.subs[sub] || []);

  /* — BREADCRUMB — */
  const bc = `
    <div class="bc">
      <span>AI Hub</span><span class="sep">›</span>
      <span>${cat}</span>
      ${sub !== '__all' ? `<span class="sep">›</span><span class="cur">${sub}</span>` : ''}
    </div>`;

  /* — PAGE HEAD — */
  const ph = `
    <div class="pg-head">
      <div>
        <div class="pg-eyebrow">${cat}</div>
        <div class="pg-title">${sub === '__all' ? '전체 서비스' : sub}</div>
        <div class="pg-desc">${catD.desc}</div>
      </div>
      <div class="pg-chip">
        <span class="dot"></span>${curItems.length}개 서비스
      </div>
    </div>`;

  /* — OVERVIEW STAT TILES — */
  let ovHTML = '';
  if (sub === '__all') {
    const total = Object.values(catD.subs).flat().length;
    ovHTML = `
      <div class="overview-grid">
        ${Object.entries(catD.subs).map(([s, items]) => `
          <div class="ov-card" onclick="selSub('${s}')">
            <div class="ov-num">${items.length}</div>
            <div class="ov-lbl">${s}</div>
            <div class="ov-bar">
              <div class="ov-bar-fill" style="width:${Math.round(items.length/total*100)}%"></div>
            </div>
          </div>`).join('')}
      </div>`;
  }

  /* — BENTO GRID SECTIONS — */
  let gridHTML = '';
  if (sub === '__all') {
    gridHTML = Object.entries(catD.subs).map(([s, items]) => `
      <div>
        <div class="sec-head">
          <span class="sec-head-text">${s}</span>
          <span class="sec-head-line"></span>
          <span class="sec-head-n">${items.length}</span>
        </div>
        <div class="bento">
          ${items.map((it,i) => cardHTML(it, i, cat, i===0)).join('')}
        </div>
      </div>`).join('');
  } else {
    gridHTML = `
      <div class="bento">
        ${curItems.map((it,i) => cardHTML(it, i, cat, i===0)).join('')}
      </div>`;
  }

  area.innerHTML = bc + ph + ovHTML + gridHTML;
}

/* ══════════════════════════════════════
   EVENTS
══════════════════════════════════════ */
function selCat(c) {
  cat = c;
  sub = Object.keys(DATA[c].subs)[0];
  q   = '';
  document.getElementById('si').value = '';
  renderAll();
}

function selSub(s) {
  sub = s;
  renderAll();
}

function onSearch(v) {
  q = v;
  renderContent();
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
function renderAll() {
  renderNav();
  renderSB();
  renderContent();
}

renderAll();
</script>
